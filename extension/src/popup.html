<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InternSave</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <main class="container">
    <header>
      <h1>InternSave</h1>
      <p>Quick launcher</p>
    </header>

    <section class="actions">
      <button id="saveBtn" class="primary-btn" type="button">Save</button>
      <button id="applyBtn" class="primary-btn" type="button">Apply</button>
      <button id="viewListBtn" class="ghost-btn" type="button">View List</button>
    </section>

    <p id="statusText" class="status-text" aria-live="polite"></p>
  </main>

  <script type="module" src="popup.js"></script>
</body>

</html>
